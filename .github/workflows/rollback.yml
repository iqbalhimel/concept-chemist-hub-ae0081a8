name: Rollback deployment

on:
  workflow_dispatch:

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest build artifact
        run: |
          echo "Fetching latest artifact..."
          ARTIFACT_URL=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/artifacts \
          | jq -r '.artifacts[] | select(.name=="site-build-backup") | .archive_download_url' | head -n 1)

          curl -L \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -o artifact.zip \
          "$ARTIFACT_URL"

      - name: Extract artifact
        run: |
          unzip artifact.zip
          tar -xzf build.tar.gz

      - name: Deploy rollback version
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: dist/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Telegram rollback alert
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="⚠️ Rollback executed for iqbalsir.bd"
