name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist folder not found. Build failed."
            exit 1
          fi
          echo "✅ dist folder exists"

      # ==============================
      # BUILD BACKUP (GitHub Artifact)
      # ==============================

      - name: Archive build
        run: |
          tar -czf build.tar.gz dist

      - name: Upload build backup
        uses: actions/upload-artifact@v4
        with:
          name: site-build-backup
          path: build.tar.gz
          retention-days: 7

      # ==============================
      # DEPLOY TO HOSTINGER
      # ==============================

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: dist/
          server-dir: ./
          dangerous-clean-slate: false
          log-level: standard

      # ==============================
      # PURGE CLOUDFLARE CACHE
      # ==============================

      - name: Purge Cloudflare Cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'

      # ==============================
      # DEPLOY HEALTH CHECK
      # ==============================

      - name: Check site health
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://iqbalsir.bd)
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Site health check failed"
            exit 1
          fi
          echo "✅ Site is live (HTTP $STATUS)"

      # ==============================
      # DEPLOY COMPLETE
      # ==============================

      - name: Deploy complete
        run: echo "🚀 Deployment finished successfully"

      # ==============================
      # TELEGRAM ALERTS
      # ==============================

      - name: Telegram notify success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Deploy success: iqbalsir.bd"

      - name: Telegram notify failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🚨 Deploy FAILED: iqbalsir.bd"
